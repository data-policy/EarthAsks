    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')

    function featureName(feature) {

    function infoHTML(obj, options = {}) {
      const name = obj && obj.country ? obj.country : (obj && obj.name ? obj.name : 'Unknown country');
      let html = '<strong>' + escapeHTML(name) + '</strong>';
      if (!obj || obj.percentText === undefined) {
        html += '<br><span class="na-text">Not Applicable / no CSV value</span>';
      } else {
        html += '<br><span class="num">' + escapeHTML(obj.percentText) + '</span>';
      }
      if (options.marker) {
        html += '<br><span class="micro-label italic">Point marker for small country visibility</span>';
      }
      return html;
    }

    function showTooltip(event, html) {

    function moveTooltip(event) {
      const pad = 14;
      const node = tooltip.node();
      const box = node.getBoundingClientRect();
      let left = event.clientX + pad;
      let top = event.clientY + pad;
      if (left + box.width > window.innerWidth - 8) left = event.clientX - box.width - pad;
      if (top + box.height > window.innerHeight - 8) top = event.clientY - box.height - pad;
      tooltip.style('left', Math.max(8, left) + 'px').style('top', Math.max(8, top) + 'px');
    }

    }

    function renderMap() {
      if (!worldFeatures) return;
      d3.select(mapEl).select('.loading').remove();
      d3.select(mapEl).selectAll('svg').remove();
      currentTransform = d3.zoomIdentity;
      const width = Math.max(320, mapEl.clientWidth);
      const height = Math.max(420, mapEl.clientHeight);

      svg = d3.select(mapEl)
        .append('svg')
        .attr('viewBox', [0, 0, width, height].join(' '))
        .attr('role', 'img')
        .attr('aria-label', 'Equal-area thematic map of clean cooking fuel and technology access by country in 2024');

      const projection = d3.geoEqualEarth()
        .rotate([0, 0])
        .precision(0.2)
        .fitExtent([[28, 56], [width - 28, height - 38]], { type: 'Sphere' });
      const path = d3.geoPath(projection);

      zoomBehavior = d3.zoom()
        .scaleExtent([1, 8])
        .translateExtent([[-width * 0.5, -height * 0.5], [width * 1.5, height * 1.5]])
        .on('zoom', (event) => {
          currentTransform = event.transform;
          g.attr('transform', currentTransform);
          updateStrokeAndMarkers();
        });
      svg.call(zoomBehavior);
      g = svg.append('g');

      g.append('path').datum({ type: 'Sphere' }).attr('class', 'sphere').attr('d', path);
      g.append('path').datum(d3.geoGraticule10()).attr('class', 'graticule').attr('d', path);

      countrySelection = g.selectAll('path.country')
        .data(worldFeatures)
        .join('path')
        .attr('class', 'country')
        .attr('fill', d => {
          const record = dataById.get(String(d.id).padStart(3, '0'));
          return record ? record.color : NA_COLOR;
        })
        .attr('d', path)
        .on('mouseenter', function(event, d) {
          const record = dataById.get(String(d.id).padStart(3, '0')) || { name: featureName(d) };
          d3.select(this).raise().classed('hovered', true).attr('stroke-width', 1.45 / currentTransform.k);
          showTooltip(event, infoHTML(record));
        })
        .on('mousemove', function(event) { moveTooltip(event); })
        .on('mouseleave', function() {
          d3.select(this).classed('hovered', false).attr('stroke-width', 0.62 / currentTransform.k);
          hideTooltip();
        })
        .on('click', function(event, d) {
          event.stopPropagation();
          const record = dataById.get(String(d.id).padStart(3, '0')) || { name: featureName(d) };
          openInfo(infoHTML(record));
        });

      const projectedMarkers = microMarkers
        .map(m => ({ ...m, point: projection([m.lon, m.lat]) }))
        .filter(m => Array.isArray(m.point) && Number.isFinite(m.point[0]) && Number.isFinite(m.point[1]));

      markerSelection = g.selectAll('circle.micro-marker')
        .data(projectedMarkers)
        .join('circle')
        .attr('class', 'micro-marker')
        .attr('cx', d => d.point[0])
        .attr('cy', d => d.point[1])
        .attr('r', 5.8)
        .attr('fill', d => d.color)
        .on('mouseenter', function(event, d) {
          d3.select(this).raise().classed('hovered', true);
          showTooltip(event, infoHTML(d, { marker: true }));
        })
        .on('mousemove', function(event) { moveTooltip(event); })
        .on('mouseleave', function() {
          d3.select(this).classed('hovered', false);
          hideTooltip();
        })
        .on('click', function(event, d) {
          event.stopPropagation();
          openInfo(infoHTML(d, { marker: true }));
        });

      updateStrokeAndMarkers();
      svg.on('click', () => infoCard.classed('hidden', true));
    }

    document.getElementById('close-info').addEventListener('click', (event) => {
      event.stopPropagation();
      infoCard.classed('hidden', true);
    });
    document.getElementById('reset-view').addEventListener('click', () => {
      if (svg && zoomBehavior) svg.transition().duration(250).call(zoomBehavior.transform, d3.zoomIdentity);
    });
    document.getElementById('zoom-in').addEventListener('click', () => {
      if (svg && zoomBehavior) svg.transition().duration(180).call(zoomBehavior.scaleBy, 1.35);
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      if (svg && zoomBehavior) svg.transition().duration(180).call(zoomBehavior.scaleBy, 1 / 1.35);
    });
    window.addEventListener('resize', () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(renderMap, 160);
    });

    renderLegend();
    renderSource();

    d3.json(worldAtlasUrl).then(world => {
      worldFeatures = topojson.feature(world, world.objects.countries).features;
      renderMap();
    }).catch(error => {
      console.error(error);
      d3.select('#map .loading').html('The map geometry could not be loaded from the online source. Please check your internet connection and reload.');
    });
  </script>
</body>
</html>
